app = 'cadia-dicom-scp'
primary_region = 'gru'

[build]

[env]
  SCP_AE_TITLE = 'CADIA-GRAU'
  SCP_PORT = '11112'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 11112

  [[services.ports]]
    port = 104

  [[services.ports]]
    port = 11112

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024