# fly.toml app configuration file generated for cadia-dicom-scp on 2026-04-01T16:19:50-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cadia-dicom-scp'
primary_region = 'gru'

[build]

[env]
  SCP_AE_TITLE = 'CADIA'
  SCP_PORT = '11112'

[http_service]
  internal_port = 11112
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 11112

  [[services.ports]]
    port = 104

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
